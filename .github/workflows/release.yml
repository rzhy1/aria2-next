name: Build aria2-next Windows x64

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: ubuntu-26.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /usr/local/x86_64-w64-mingw32
      CC: x86_64-w64-mingw32-gcc-posix
      CXX: x86_64-w64-mingw32-g++-posix
      CFLAGS: "-O3 -pipe -flto"
      CXXFLAGS: "-O3 -pipe -flto"
      LDFLAGS: "-static -static-libgcc -static-libstdc++ -Wl,--gc-sections"

    steps:
    - name: Checkout aria2-next
      uses: actions/checkout@v6
      with:
        repository: AnInsomniacy/aria2-next
        ref: main

    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y \
          make \
          cmake \
          ninja-build \
          pkg-config \
          binutils \
          curl \
          tar \
          dpkg-dev \
          gcc-mingw-w64-x86-64 \
          g++-mingw-w64-x86-64

    - name: Prepare prefix
      run: |
        sudo mkdir -p $PREFIX
        sudo chown $USER:$USER $PREFIX

    - name: Build expat
      run: |
        EXPAT_VERSION=2.7.1
        curl -LO \
        https://github.com/libexpat/libexpat/releases/download/R_2_7_1/expat-${EXPAT_VERSION}.tar.gz
        tar xf expat-${EXPAT_VERSION}.tar.gz
        cd expat-${EXPAT_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          CC=$CC \
          CFLAGS="$CFLAGS"
        make -j$(nproc)
        make install

    - name: Build zlib
      run: |
        ZLIB_VERSION=1.3.2
        curl -fLLO \
        https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz
        tar xf zlib-${ZLIB_VERSION}.tar.gz
        cmake \
        -S zlib-${ZLIB_VERSION} \
        -B zlib-build \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Windows \
        -DCMAKE_C_COMPILER=$CC \
        -DCMAKE_INSTALL_PREFIX=$PREFIX \
        -DBUILD_SHARED_LIBS=OFF
        cmake --build zlib-build \
          --parallel $(nproc)
        cmake --install zlib-build

    - name: Build sqlite3
      run: |
        SQLITE_VERSION=3490000
        curl -LO \
        https://www.sqlite.org/2025/sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        tar xf sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        cd sqlite-autoconf-${SQLITE_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          --disable-load-extension \
          CC=$CC
        make -j$(nproc)
        make install

    - name: Build c-ares
      run: |
        CARES_VERSION=1.34.2
        curl -LO \
        https://github.com/c-ares/c-ares/releases/download/v${CARES_VERSION}/c-ares-${CARES_VERSION}.tar.gz
        tar xf c-ares-${CARES_VERSION}.tar.gz
        cd c-ares-${CARES_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          LIBS="-lws2_32" \
          CC=$CC
        make -j$(nproc)
        make install

    - name: Build libssh2
      run: |
        LIBSSH2_VERSION=1.11.1
        curl -LO \
        https://www.libssh2.org/download/libssh2-${LIBSSH2_VERSION}.tar.gz
        tar xf libssh2-${LIBSSH2_VERSION}.tar.gz
        cmake \
          -S libssh2-${LIBSSH2_VERSION} \
          -B libssh2-build \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_INSTALL_PREFIX=$PREFIX \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON \
          -DBUILD_TESTING=OFF \
          -DCRYPTO_BACKEND=WinCNG
        cmake \
          --build libssh2-build \
          --target install \
          -j$(nproc)


    - name: Configure aria2-next
      run: |
        cmake \
        -S . \
        -B build \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Windows \
        -DCMAKE_C_COMPILER=$CC \
        -DCMAKE_CXX_COMPILER=$CXX \
        -DCMAKE_BUILD_TYPE=Release \
        -DARIA2_STATIC_DEPENDENCIES=ON \
        -DARIA2_WITH_WINTLS=ON \
        -DARIA2_WITH_OPENSSL=OFF \
        -DARIA2_WITH_GNUTLS=OFF \
        -DARIA2_WITH_CARES=ON \
        -DARIA2_WITH_SQLITE3=ON \
        -DARIA2_WITH_EXPAT=ON \
        -DARIA2_WITH_LIBSSH2=ON \
        -DARIA2_WITH_LIBXML2=OFF \
        -DARIA2_WITH_GMP=OFF \
        -DARIA2_WITH_LIBGCRYPT=OFF \
        -DARIA2_WITH_LIBNETTLE=OFF \
        -DCMAKE_PREFIX_PATH=$PREFIX \
        -DCMAKE_C_FLAGS="$CFLAGS" \
        -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
        -DCMAKE_EXE_LINKER_FLAGS="$LDFLAGS"
    - name: Compile
      run:
        cmake --build build --parallel $(nproc)
    - name: Package
      run: |
        mkdir release
        cp build/aria2-next.exe \
        release/aria2-next-windows-x64.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-next-windows-x64


        path:

          release/aria2-next-windows-x64.exe
