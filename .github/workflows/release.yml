  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon, static)
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS ARM64
    needs: validate-release
    runs-on: macos-15
    env:
      PREFIX: ${{ github.workspace }}/packaging/build-deps
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      MACOSX_VERSION_MIN: "11.0"
    steps:
      - uses: actions/checkout@v6
