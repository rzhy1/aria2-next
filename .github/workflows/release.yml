  # ---------------------------------------------------------------------------
  # Windows x86_64 (cross-compiled on Ubuntu, following packaging/docker/Dockerfile.mingw)
  # ---------------------------------------------------------------------------
  build-windows-x64:
    name: Windows x86_64
    needs: resolve-release
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      ARIA2_BUILD_PROFILE: ${{ needs.resolve-release.outputs.build_profile }}
      CMAKE_BUILD_TYPE: ${{ needs.resolve-release.outputs.cmake_build_type }}
      HOST: x86_64-w64-mingw32
      PREFIX: /usr/local/x86_64-w64-mingw32
      STRIP_BINARY: ${{ needs.resolve-release.outputs.strip_binary }}
      WINDOWS_DEBUG_MAP_FLAGS: ${{ needs.resolve-release.outputs.windows_debug_map_flags }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils cmake ninja-build \
            patch ca-certificates pkg-config curl dpkg-dev lzip \
            gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$CURL_URL" "$CURL_ARCHIVE" "$CURL_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"
          curl_fetch "$BOOST_URL" "$BOOST_ARCHIVE" "$BOOST_SHA256"
          curl_fetch "$LIBTORRENT_URL" "$LIBTORRENT_ARCHIVE" "$LIBTORRENT_SHA256"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile windows
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld \
          RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile windows
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests \
            --cross-compile-prefix=$HOST- \
            --prefix=$PREFIX --libdir=lib \
            $RELEASE_CFLAGS
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2 for libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_libssh2_for_curl \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$HOST-gcc \
            -DCMAKE_RC_COMPILER=$HOST-windres \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_curl \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$HOST-gcc \
            -DCMAKE_RC_COMPILER=$HOST-windres \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build Boost headers
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          install_boost_headers

      - name: Build libtorrent-rasterbar
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_libtorrent_rasterbar \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$HOST-gcc \
            -DCMAKE_CXX_COMPILER=$HOST-g++ \
            -DCMAKE_RC_COMPILER=$HOST-windres \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build aria2
        run: |
          . packaging/scripts/release-size-profile windows
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$HOST-gcc \
            -DCMAKE_CXX_COMPILER=$HOST-g++ \
            -DCMAKE_RC_COMPILER=$HOST-windres \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_RELEASE_SIZE_OPTIMIZED=ON \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_C_FLAGS="$RELEASE_CFLAGS" \
            -DCMAKE_CXX_FLAGS="$RELEASE_CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$RELEASE_LDFLAGS $WINDOWS_DEBUG_MAP_FLAGS" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          if [ "$STRIP_BINARY" = true ]; then
            $HOST-strip build/release/aria2-next.exe
          fi
          packaging/scripts/check-runtime-deps windows-x86_64 build/release/aria2-next.exe
          packaging/scripts/size-audit windows-x86_64 build/release/aria2-next.exe

      - name: Package
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          cp build/release/aria2-next.exe "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-windows-x86_64.exe"
          if [ -f build/release/aria2-next.map ]; then
            cp build/release/aria2-next.map "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-windows-x86_64.map"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64${{ needs.resolve-release.outputs.artifact_suffix }}
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-windows-x86_64.exe
          archive: false

      - uses: actions/upload-artifact@v7
        if: needs.resolve-release.outputs.build_profile == 'debug'
        with:
          name: windows-x86_64-debug-map
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-windows-x86_64.map
          if-no-files-found: error
          archive: false

  # ---------------------------------------------------------------------------
  # Windows ARM64 (cross-compiled on Ubuntu with llvm-mingw)
  # ---------------------------------------------------------------------------
  build-windows-arm64:
    name: Windows ARM64
    needs: resolve-release
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      ARIA2_BUILD_PROFILE: ${{ needs.resolve-release.outputs.build_profile }}
      CMAKE_BUILD_TYPE: ${{ needs.resolve-release.outputs.cmake_build_type }}
      HOST: aarch64-w64-mingw32
      PREFIX: /usr/local/aarch64-w64-mingw32
      STRIP_BINARY: ${{ needs.resolve-release.outputs.strip_binary }}
      WINDOWS_DEBUG_MAP_FLAGS: ${{ needs.resolve-release.outputs.windows_debug_map_flags }}
      CC: aarch64-w64-mingw32-clang
      CXX: aarch64-w64-mingw32-clang++
      AR: aarch64-w64-mingw32-ar
      RANLIB: aarch64-w64-mingw32-ranlib
      STRIP: aarch64-w64-mingw32-strip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Install llvm-mingw toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils cmake ninja-build \
            patch ca-certificates pkg-config curl dpkg-dev lzip
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$LLVM_MINGW_URL" "$LLVM_MINGW_ARCHIVE" "$LLVM_MINGW_SHA256"
          tar xf "$LLVM_MINGW_ARCHIVE"
          toolchain="$PWD/llvm-mingw-$LLVM_MINGW_VERSION-ucrt-ubuntu-22.04-x86_64/bin"
          echo "$toolchain" >> "$GITHUB_PATH"
          {
            echo "CC=$toolchain/aarch64-w64-mingw32-clang"
            echo "CXX=$toolchain/aarch64-w64-mingw32-clang++"
            echo "AR=$toolchain/aarch64-w64-mingw32-ar"
            echo "RANLIB=$toolchain/aarch64-w64-mingw32-ranlib"
            echo "STRIP=$toolchain/aarch64-w64-mingw32-strip"
          } >> "$GITHUB_ENV"

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$CURL_URL" "$CURL_ARCHIVE" "$CURL_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"
          curl_fetch "$BOOST_URL" "$BOOST_ARCHIVE" "$BOOST_SHA256"
          curl_fetch "$LIBTORRENT_URL" "$LIBTORRENT_ARCHIVE" "$LIBTORRENT_SHA256"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile windows
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$CC AR=$AR LD=$HOST-ld \
          RANLIB=$RANLIB STRIP=$STRIP \
          CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile windows
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests no-asm \
            --prefix=$PREFIX --libdir=lib \
            CC=$CC AR=$AR RANLIB=$RANLIB \
            $RELEASE_CFLAGS
          env "PATH=$PATH" make -j$(nproc) build_libs
          sudo env "PATH=$PATH" make install_dev

      - name: Build libssh2 for libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_libssh2_for_curl \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_AR=$AR \
            -DCMAKE_RANLIB=$RANLIB \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_curl \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_AR=$AR \
            -DCMAKE_RANLIB=$RANLIB \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build Boost headers
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          install_boost_headers

      - name: Build libtorrent-rasterbar
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile windows
          ARIA2_BUILD_JOBS=$(nproc) build_libtorrent_rasterbar \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_AR=$AR \
            -DCMAKE_RANLIB=$RANLIB \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config

      - name: Build aria2
        run: |
          . packaging/scripts/release-size-profile windows
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_AR=$AR \
            -DCMAKE_RANLIB=$RANLIB \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_RELEASE_SIZE_OPTIMIZED=ON \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_C_FLAGS="$RELEASE_CFLAGS" \
            -DCMAKE_CXX_FLAGS="$RELEASE_CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$RELEASE_LDFLAGS $WINDOWS_DEBUG_MAP_FLAGS" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          if [ "$STRIP_BINARY" = true ]; then
            $STRIP build/release/aria2-next.exe
          fi
          packaging/scripts/check-runtime-deps windows-arm64 build/release/aria2-next.exe
          packaging/scripts/size-audit windows-arm64 build/release/aria2-next.exe

      - name: Package
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          cp build/release/aria2-next.exe "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-windows-arm64.exe"
          if [ -f build/release/aria2-next.map ]; then
            cp build/release/aria2-next.map "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-windows-arm64.map"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: windows-arm64${{ needs.resolve-release.outputs.artifact_suffix }}
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-windows-arm64.exe
          archive: false

      - uses: actions/upload-artifact@v7
        if: needs.resolve-release.outputs.build_profile == 'debug'
        with:
          name: windows-arm64-debug-map
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-windows-arm64.map
          if-no-files-found: error
          archive: false

  # ---------------------------------------------------------------------------
  # Publish or archive release assets
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Publish or Archive Release Assets
    needs:
      - resolve-release
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-intel
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    env:
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      VERSION: ${{ needs.resolve-release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aria2-next-* > ../checksums.sha256
          cd ..
          mv checksums.sha256 "artifacts/aria2-next-${VERSION}${ARTIFACT_SUFFIX}-checksums.sha256"

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" artifacts/* --clobber

      - name: Upload artifacts for manual validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-release-assets
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
