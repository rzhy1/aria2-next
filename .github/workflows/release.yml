name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Expected release version, with or without leading v. Use latest for the current CMakeLists.txt version."
        required: false
        default: latest
        type: string
      build_profile:
        description: "Manual validation build profile. Official releases always use release."
        required: false
        default: release
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  resolve-release:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      build_profile: ${{ steps.resolve.outputs.build_profile }}
      cmake_build_type: ${{ steps.resolve.outputs.cmake_build_type }}
      artifact_suffix: ${{ steps.resolve.outputs.artifact_suffix }}
      strip_binary: ${{ steps.resolve.outputs.strip_binary }}
      windows_debug_map_flags: ${{ steps.resolve.outputs.windows_debug_map_flags }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Resolve Release Version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
          REQUESTED_BUILD_PROFILE: ${{ github.event.inputs.build_profile }}
        run: |
          VERSION=$(sed -n 's/^  VERSION \([0-9][0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "Unable to read project version from CMakeLists.txt" >&2
            exit 1
          fi

          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid CMake project version: $VERSION" >&2
            exit 1
          fi

          if [ -n "$REQUESTED_VERSION" ]; then
            REQUESTED_VERSION="${REQUESTED_VERSION#v}"

            case "$REQUESTED_VERSION" in
              latest)
                REQUESTED_VERSION=
                ;;
            esac
          fi

          if [ -n "$REQUESTED_VERSION" ]; then

            if ! printf '%s\n' "$REQUESTED_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid workflow_dispatch version: $REQUESTED_VERSION" >&2
              exit 1
            fi

            if [ "$VERSION" != "$REQUESTED_VERSION" ]; then
              echo "workflow_dispatch version $REQUESTED_VERSION does not match CMake project version $VERSION" >&2
              exit 1
            fi
          fi

          if [ "$EVENT_NAME" = "release" ]; then
            BUILD_PROFILE=release
            TAG_VERSION="${RELEASE_TAG#v}"

            if ! printf '%s\n' "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid release tag: $RELEASE_TAG" >&2
              exit 1
            fi

            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "Release tag $RELEASE_TAG does not match CMake project version $VERSION" >&2
              exit 1
            fi
          else
            BUILD_PROFILE="${REQUESTED_BUILD_PROFILE:-release}"
          fi

          case "$BUILD_PROFILE" in
            release)
              CMAKE_BUILD_TYPE=Release
              ARTIFACT_SUFFIX=
              STRIP_BINARY=true
              WINDOWS_DEBUG_MAP_FLAGS=
              ;;
            debug)
              CMAKE_BUILD_TYPE=RelWithDebInfo
              ARTIFACT_SUFFIX=-debug
              STRIP_BINARY=false
              WINDOWS_DEBUG_MAP_FLAGS="-Wl,-Map,aria2-next.map"
              ;;
            *)
              echo "Invalid build profile: $BUILD_PROFILE" >&2
              exit 1
              ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_profile=$BUILD_PROFILE" >> "$GITHUB_OUTPUT"
          echo "cmake_build_type=$CMAKE_BUILD_TYPE" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=$ARTIFACT_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "strip_binary=$STRIP_BINARY" >> "$GITHUB_OUTPUT"
          echo "windows_debug_map_flags=$WINDOWS_DEBUG_MAP_FLAGS" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux x86_64 (static)
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Linux x86_64
    needs: resolve-release
    runs-on: ubuntu-22.04
    env:
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      ARIA2_BUILD_PROFILE: ${{ needs.resolve-release.outputs.build_profile }}
      CMAKE_BUILD_TYPE: ${{ needs.resolve-release.outputs.cmake_build_type }}
      PREFIX: /usr/local
      STRIP_BINARY: ${{ needs.resolve-release.outputs.strip_binary }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config

      - name: Download dependency sources
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$CURL_URL" "$CURL_ARCHIVE" "$CURL_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"
          curl_fetch "$BOOST_URL" "$BOOST_ARCHIVE" "$BOOST_SHA256"
          curl_fetch "$LIBTORRENT_URL" "$LIBTORRENT_ARCHIVE" "$LIBTORRENT_SHA256"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile linux
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CPPFLAGS="$RELEASE_CPPFLAGS" CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure --prefix=$PREFIX --static
          make -j$(nproc)
          sudo make install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile linux
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure linux-x86_64 no-shared no-module no-tests \
            --prefix=$PREFIX --libdir=lib \
            $RELEASE_CFLAGS
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2 for libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile linux
          ARIA2_BUILD_JOBS=$(nproc) build_libssh2_for_curl

      - name: Build libcurl
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile linux
          ARIA2_BUILD_JOBS=$(nproc) build_curl

      - name: Build Boost headers
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          install_boost_headers

      - name: Build libtorrent-rasterbar
        run: |
          source packaging/dependencies.env
          . packaging/scripts/common.sh
          . packaging/scripts/release-size-profile linux
          ARIA2_BUILD_JOBS=$(nproc) build_libtorrent_rasterbar

      - name: Build aria2
        run: |
          . packaging/scripts/release-size-profile linux
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DCMAKE_C_FLAGS="$RELEASE_CFLAGS" \
            -DCMAKE_CXX_FLAGS="$RELEASE_CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$RELEASE_LDFLAGS" \
            -DARIA2_RELEASE_SIZE_OPTIMIZED=ON \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          if [ "$STRIP_BINARY" = true ]; then
            strip build/release/aria2-next
          fi
          packaging/scripts/check-runtime-deps linux build/release/aria2-next
          packaging/scripts/size-audit linux build/release/aria2-next
          packaging/scripts/release-smoke "$PWD/build/release/aria2-next"

      - name: Package
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          cp build/release/aria2-next "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-linux-x86_64"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64${{ needs.resolve-release.outputs.artifact_suffix }}
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-linux-x86_64
          archive: false

