name: Docker Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Latest Release
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.release.outputs.image }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest release
        id: release
        run: |
          tag=$(gh release view --json tagName --jq .tagName)
          version=${tag#v}
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid latest release tag: $tag" >&2
            exit 1
          fi
          image="ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          {
            echo "image=$image"
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            target_arch: amd64
            asset_arch: x86_64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            target_arch: arm64
            asset_arch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download latest release Linux assets
        run: |
          version="${{ needs.resolve.outputs.version }}"
          mkdir -p release-assets
          gh release download "${{ needs.resolve.outputs.tag }}" \
            --pattern "aria2-next-${version}-linux-${{ matrix.asset_arch }}" \
            --dir release-assets
          test -f "release-assets/aria2-next-${version}-linux-${{ matrix.asset_arch }}"

      - name: Prepare container context
        run: |
          version="${{ needs.resolve.outputs.version }}"
          mkdir -p "docker-context/linux-${{ matrix.target_arch }}"
          cp packaging/docker/Dockerfile docker-context/Dockerfile
          cp "release-assets/aria2-next-${version}-linux-${{ matrix.asset_arch }}" \
            "docker-context/linux-${{ matrix.target_arch }}/aria2-next"
          chmod 755 "docker-context/linux-${{ matrix.target_arch }}/aria2-next"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ needs.resolve.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ needs.resolve.outputs.version }}
            REVISION=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.target_arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish Multi-Architecture Manifest
    needs:
      - resolve
      - build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          image="${{ needs.resolve.outputs.image }}"
          refs=
          for digest in /tmp/digests/*; do
            refs="$refs $image@sha256:$(basename "$digest")"
          done
          docker buildx imagetools create \
            -t "$image:${{ needs.resolve.outputs.tag }}" \
            -t "$image:latest" \
            $refs
          docker buildx imagetools inspect "$image:latest"
