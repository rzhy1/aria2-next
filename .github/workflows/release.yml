  # ---------------------------------------------------------------------------
  # Windows x86_64 (cross-compiled on Ubuntu, following packaging/docker/Dockerfile.mingw)
  # ---------------------------------------------------------------------------
  build-windows-x64:
    name: Windows x86_64
    needs: validate-release
    runs-on: ubuntu-24.04
    env:
      HOST: x86_64-w64-mingw32
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      PREFIX: /usr/local/x86_64-w64-mingw32
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils cmake ninja-build \
            patch ca-certificates pkg-config curl dpkg-dev lzip \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$EXPAT_URL" "$EXPAT_ARCHIVE" "$EXPAT_SHA256"
          curl_fetch "$SQLITE_URL" "$SQLITE_ARCHIVE" "$SQLITE_SHA256"
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$CARES_URL" "$CARES_ARCHIVE" "$CARES_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld \
          RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo make -j$(nproc) install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32" \
            ac_cv_func_if_indextoname=no
          sudo make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests \
            --cross-compile-prefix=$HOST- \
            --prefix=$PREFIX --libdir=lib \
            -O2
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --disable-examples-build \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lws2_32 -lcrypt32"
          sudo make -j$(nproc) install

      - name: Build aria2
        run: |
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$HOST-gcc \
            -DCMAKE_CXX_COMPILER=$HOST-g++ \
            -DCMAKE_RC_COMPILER=$HOST-windres \
            -DCMAKE_BUILD_TYPE=Release \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_CARES=ON \
            -DARIA2_WITH_GNUTLS=OFF \
            -DARIA2_WITH_OPENSSL=ON \
            -DARIA2_WITH_WINTLS=OFF \
            -DARIA2_WITH_SQLITE3=ON \
            -DARIA2_WITH_LIBXML2=OFF \
            -DARIA2_WITH_EXPAT=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_WITH_GMP=OFF \
            -DARIA2_WITH_LIBSSH2=ON \
            -DARIA2_WITH_LIBGCRYPT=OFF \
            -DARIA2_WITH_LIBNETTLE=OFF \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$PREFIX/lib" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          $HOST-strip build/release/aria2c.exe
          packaging/scripts/check-runtime-deps windows-x86_64 build/release/aria2c.exe

      - name: Package
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIRNAME="aria2-${VERSION}-windows-x86_64"
          mkdir -p "${DIRNAME}"
          cp build/release/aria2c.exe "${DIRNAME}/"
          cp COPYING README.md "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: aria2-*-windows-x86_64.zip

  # ---------------------------------------------------------------------------
  # Windows ARM64 (cross-compiled on Ubuntu with llvm-mingw)
  # ---------------------------------------------------------------------------
  build-windows-arm64:
    name: Windows ARM64
    needs: validate-release
    runs-on: ubuntu-24.04
    env:
      HOST: aarch64-w64-mingw32
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      PREFIX: /usr/local/aarch64-w64-mingw32
      CC: aarch64-w64-mingw32-clang
      CXX: aarch64-w64-mingw32-clang++
      AR: aarch64-w64-mingw32-ar
      RANLIB: aarch64-w64-mingw32-ranlib
      STRIP: aarch64-w64-mingw32-strip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Install llvm-mingw toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils cmake ninja-build \
            patch ca-certificates pkg-config curl dpkg-dev lzip
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$LLVM_MINGW_URL" "$LLVM_MINGW_ARCHIVE" "$LLVM_MINGW_SHA256"
          tar xf "$LLVM_MINGW_ARCHIVE"
          echo "$PWD/llvm-mingw-$LLVM_MINGW_VERSION-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$EXPAT_URL" "$EXPAT_ARCHIVE" "$EXPAT_SHA256"
          curl_fetch "$SQLITE_URL" "$SQLITE_ARCHIVE" "$SQLITE_SHA256"
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$CARES_URL" "$CARES_ARCHIVE" "$CARES_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC" CXX="$CXX"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$CC AR=$AR LD=$HOST-ld \
          RANLIB=$RANLIB STRIP=$STRIP \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC" LIBS="-lws2_32" \
            ac_cv_func_if_indextoname=no
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests no-asm \
            --prefix=$PREFIX --libdir=lib \
            CC=$CC AR=$AR RANLIB=$RANLIB \
            -O2
          env "PATH=$PATH" make -j$(nproc) build_libs
          sudo env "PATH=$PATH" make install_dev

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --disable-examples-build \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CC="$CC" \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lws2_32 -lcrypt32"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build aria2
        run: |
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_AR=$AR \
            -DCMAKE_RANLIB=$RANLIB \
            -DCMAKE_BUILD_TYPE=Release \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_CARES=ON \
            -DARIA2_WITH_GNUTLS=OFF \
            -DARIA2_WITH_OPENSSL=ON \
            -DARIA2_WITH_WINTLS=OFF \
            -DARIA2_WITH_SQLITE3=ON \
            -DARIA2_WITH_LIBXML2=OFF \
            -DARIA2_WITH_EXPAT=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_WITH_GMP=OFF \
            -DARIA2_WITH_LIBSSH2=ON \
            -DARIA2_WITH_LIBGCRYPT=OFF \
            -DARIA2_WITH_LIBNETTLE=OFF \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$PREFIX/lib" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          $STRIP build/release/aria2c.exe
          packaging/scripts/check-runtime-deps windows-arm64 build/release/aria2c.exe

      - name: Package
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIRNAME="aria2-${VERSION}-windows-arm64"
          mkdir -p "${DIRNAME}"
          cp build/release/aria2c.exe "${DIRNAME}/"
          cp COPYING README.md "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-arm64
          path: aria2-*-windows-arm64.zip

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Upload Release Assets
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-intel
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aria2-* > ../checksums.sha256
          cd ..
          mv checksums.sha256 "artifacts/aria2-${RELEASE_TAG#v}-checksums.sha256"

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" artifacts/* --clobber

      - name: Upload artifacts for manual validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: aria2-${{ github.event.inputs.tag }}-release-assets
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
