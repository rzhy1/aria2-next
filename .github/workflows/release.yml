          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$GMP_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBGPG_ERROR_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBGCRYPT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"

      - name: Build zlib
        run: |
