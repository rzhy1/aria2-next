name: Build aria2-next Windows x64

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' 
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-upstream:
    name: Check upstream changes
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      new_sha: ${{ steps.upstream.outputs.sha }}
    steps:
      - name: Get upstream latest SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/AnInsomniacy/aria2-next.git HEAD | cut -f1)
          echo "Upstream commit:"
          echo "$SHA"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      - name: Get last build SHA
        id: last
        run: |
          LAST=$(git ls-remote https://github.com/${{ github.repository }}.git refs/tags/aria2-next-build | awk '{print $1}')
          echo "Last build:"
          echo "$LAST"
          echo "sha=$LAST" >> $GITHUB_OUTPUT
      - name: Compare
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" = "${{ steps.last.outputs.sha }}" ]; then
            echo "No update"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "New commit detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          
  build-windows-x64:
    name: Windows x64
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-26.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /usr/local/x86_64-w64-mingw32
      CC: x86_64-w64-mingw32-gcc-posix
      CXX: x86_64-w64-mingw32-g++-posix
      CFLAGS: "-Os -pipe -ffunction-sections -fdata-sections -flto=auto -g0"
      CXXFLAGS: "-Os -pipe -ffunction-sections -fdata-sections -flto=auto -g0"
      LDFLAGS: "-static -static-libgcc -static-libstdc++ -Wl,--gc-sections -s"
      PKG_CONFIG_PATH: ""
      PKG_CONFIG_LIBDIR: /usr/local/x86_64-w64-mingw32/lib/pkgconfig

    steps:
    - name: Checkout aria2-next
      uses: actions/checkout@v6
      with:
        repository: AnInsomniacy/aria2-next
        ref: main
        fetch-depth: 0

    - name: Patch aria2 options
      run: |
        sed -i 's/PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1M", 1_m, 1_g))/PREF_PIECE_LENGTH, TEXT_PIECE_LENGTH, "1K", 1_k, 1_g))/g' src/OptionHandlerFactory.cc
    
    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y \
          make \
          cmake \
          ninja-build \
          pkg-config \
          binutils \
          curl \
          tar \
          dpkg-dev \
          gcc-mingw-w64-x86-64 \
          g++-mingw-w64-x86-64

    - name: Prepare prefix
      run: |
        sudo mkdir -p $PREFIX
        sudo chown $USER:$USER $PREFIX

    - name: Build expat
      run: |
        EXPAT_VERSION=2.8.2
        curl -LO https://github.com/libexpat/libexpat/releases/download/R_2_8_2/expat-${EXPAT_VERSION}.tar.gz
        tar xf expat-${EXPAT_VERSION}.tar.gz
        cd expat-${EXPAT_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          CC=$CC \
          CFLAGS="$CFLAGS"
        make -j$(nproc)
        make install

    - name: Build zlib
      run: |
        ZLIB_VERSION=1.3.2
        curl -fLLO  https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz
        tar xf zlib-${ZLIB_VERSION}.tar.gz
        cd zlib-${ZLIB_VERSION}
        CC=$CC CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS" ./configure --static --prefix=$PREFIX
        make -j$(nproc)
        make install

    - name: Build sqlite3
      run: |
        SQLITE_VERSION=3530300
        curl -LO https://www.sqlite.org/2026/sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        tar xf sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        cd sqlite-autoconf-${SQLITE_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          --disable-load-extension \
          CC=$CC
        make -j$(nproc)
        make install

    - name: Build c-ares
      run: |
        CARES_VERSION=1.34.8
        curl -LO https://github.com/c-ares/c-ares/releases/download/v${CARES_VERSION}/c-ares-${CARES_VERSION}.tar.gz
        tar xf c-ares-${CARES_VERSION}.tar.gz
        cd c-ares-${CARES_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          LIBS="-lws2_32" \
          CC=$CC
        make -j$(nproc)
        make install

    - name: Build OpenSSL
      run: |
          OPENSSL_VERSION=3.6.3
          curl -LO https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz
          tar xf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}
          CC=gcc-posix ./Configure mingw64 \
            --prefix=$PREFIX \
            --libdir=lib \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            no-shared \
            no-tests \
            no-unit-test \
            no-legacy \
            no-deprecated \
            no-engine \
            no-ui-console \
            no-ssl3 \
            no-tls1 \
            no-tls1_1 \
            no-weak-ssl-ciphers \
            no-psk \
            no-srp \
            no-dsa \
            no-idea \
            no-md2 \
            no-md4 \
            no-mdc2 \
            no-rc2 \
            no-rc4 \
            no-rc5 \
            no-seed \
            no-bf \
            no-cast \
            no-camellia \
            $CFLAGS
          make build_libs -j$(nproc)
          make install_dev

    - name: Build libssh2
      run: |
        LIBSSH2_VERSION=1.11.1
        curl -LO https://www.libssh2.org/download/libssh2-${LIBSSH2_VERSION}.tar.gz
        tar xf libssh2-${LIBSSH2_VERSION}.tar.gz
        cmake \
          -S libssh2-${LIBSSH2_VERSION} \
          -B libssh2-build \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_INSTALL_PREFIX=$PREFIX \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON \
          -DBUILD_TESTING=OFF \
          -DCRYPTO_BACKEND=OpenSSL \
          -DCMAKE_EXE_LINKER_FLAGS="$LDFLAGS" \
          -DCMAKE_C_FLAGS="$CFLAGS"
        cmake --build libssh2-build --target install -j$(nproc)

    - name: Configure aria2-next
      run: |
        cmake \
        -S . \
        -B build \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Windows \
        -DCMAKE_C_COMPILER=$CC \
        -DCMAKE_CXX_COMPILER=$CXX \
        -DCMAKE_BUILD_TYPE=Release \
        -DARIA2_STATIC_DEPENDENCIES=ON \
        -DARIA2_WITH_WINTLS=OFF \
        -DARIA2_WITH_OPENSSL=ON \
        -DARIA2_WITH_GNUTLS=OFF \
        -DARIA2_WITH_CARES=ON \
        -DARIA2_WITH_SQLITE3=ON \
        -DARIA2_WITH_EXPAT=ON \
        -DARIA2_WITH_LIBSSH2=ON \
        -DARIA2_WITH_LIBXML2=OFF \
        -DARIA2_WITH_GMP=OFF \
        -DARIA2_WITH_LIBGCRYPT=OFF \
        -DARIA2_WITH_LIBNETTLE=OFF \
        -DCMAKE_PREFIX_PATH=$PREFIX \
        -DCMAKE_C_FLAGS="$CFLAGS" \
        -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
        -DCMAKE_EXE_LINKER_FLAGS="$LDFLAGS" \
        -DCMAKE_FIND_LIBRARY_SUFFIXES=".a"
    - name: Compile
      run:
        cmake --build build --parallel $(nproc)
    - name: Package
      run: |
        mkdir -p release
        x86_64-w64-mingw32-strip --strip-all --remove-section=.comment --remove-section=.note build/aria2-next.exe -o release/aria2-next.exe
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-next-windows-x64
        path: release/aria2-next.exe

    - name: Create Release
      if: success()
      uses: ncipollo/release-action@v1
      with:
        tag: aria2-next
        allowUpdates: true
        artifacts: release/aria2-next.exe
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Update build tag
      if: success()
      run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git remote add upstream-tag https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          SHA=${{ needs.check-upstream.outputs.new_sha }}
          echo "Update aria2-next-build tag:"
          echo "$SHA"
          git tag -f aria2-next-build $SHA
          git push upstream-tag \
          aria2-next-build \
          --force
