name: Bug Report
description: Report an aria2-next engine, crash, build, or release artifact bug
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report reproducible aria2-next engine bugs here, including crashes, build failures, release artifact problems, and protocol regressions.
        Motrix Next UI, installer, updater, tray, history, notification, and desktop integration issues belong in Motrix Next.
        Do not post secrets, cookies, proxy credentials, private tracker data, signed URL tokens, or unredacted crash dumps.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what failed and what you expected instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Paste `aria2-next --version`, the release tag, or the commit SHA.
      placeholder: "Aria2 Next version 2.2.7, v2.2.7, or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows x86_64
        - Windows ARM64
        - Linux x86_64
        - Linux ARM64
        - Android ARM64
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "Windows 11 24H2, Ubuntu 24.04 x86_64, macOS 15.5"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Issue Type
      options:
        - Transfer or protocol bug
        - Process crash or abort
        - JSON-RPC behavior
        - Checksum, session, or input-file behavior
        - Proxy or certificate behavior
        - Local build failure
        - CI or release workflow failure
        - Release artifact or checksum problem
        - Other
    validations:
      required: true

  - type: textarea
    id: surface
    attributes:
      label: Affected Surface
      description: Name the protocol, command, build target, platform artifact, RPC method, or packaging path involved.
      placeholder: "HTTP Range, magnet metadata RPC, ED2K, Windows ARM64 release artifact, local CMake build"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Command, RPC Call, Input File, or Workflow
      description: Paste the smallest reproducing command, JSON-RPC request, input-file entry, local build command, or workflow run link. Redact secrets.
      render: text
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Provide the shortest sequence that reproduces the bug. For crashes, include the trigger and timing. For builds, include the target and failing step.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Failure Output
      description: Attach debug logs, stderr, WER/core dump notes, compiler output, workflow logs, checksum output, or artifact inspection output as relevant.
      render: text
    validations:
      required: true

  - type: textarea
    id: comparison
    attributes:
      label: Regression or Comparison
      description: Mention another aria2-next version, upstream aria2, browser, curl, or Motrix Next result if it behaves differently.

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I searched existing issues.
          required: true
        - label: I redacted secrets and private tokens.
          required: true
        - label: This is a reproducible engine bug, not a general usage question.
          required: true
