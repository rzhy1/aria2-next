  # ---------------------------------------------------------------------------
  # Windows x86_64 (cross-compiled on Ubuntu, following packaging/docker/Dockerfile.mingw)
  # ---------------------------------------------------------------------------
  build-windows-x64:
    name: Windows x86_64
    runs-on: ubuntu-24.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /usr/local/x86_64-w64-mingw32
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils autoconf automake autotools-dev autopoint libtool \
            patch ca-certificates pkg-config curl dpkg-dev lzip gettext \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          curl -L --retry 5 --connect-timeout 15 -O "$GMP_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$EXPAT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$SQLITE_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$ZLIB_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$OPENSSL_URL"

      - name: Build gmp
        run: |
          source packaging/dependencies.env
          tar xf "$GMP_ARCHIVE" && cd "gmp-$GMP_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --disable-cxx --enable-fat \
            CFLAGS="-mtune=generic -O2 -g0"
          sudo make -j$(nproc) install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)
          sudo make -j$(nproc) install

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$HOST-gcc AR=$HOST-ar LD=$HOST-ld \
          RANLIB=$HOST-ranlib STRIP=$HOST-strip \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo make -j$(nproc) install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            LIBS="-lws2_32" \
            ac_cv_func_if_indextoname=no
          sudo make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests \
            --cross-compile-prefix=$HOST- \
            --prefix=$PREFIX --libdir=lib \
            -O2
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --disable-examples-build \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lws2_32 -lcrypt32"
          sudo make -j$(nproc) install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --without-included-gettext --disable-nls \
            --with-libcares --without-gnutls --with-openssl --without-wintls \
            --with-sqlite3 --without-libxml2 --with-libexpat \
            --with-libz --with-libgmp --with-libssh2 \
            --without-libgcrypt --without-libnettle \
            ARIA2_STATIC=yes \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG="/usr/bin/pkg-config" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lcrypt32"
          make -j$(nproc)
          $HOST-strip src/aria2c.exe

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-windows-x86_64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c.exe "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: aria2-*-windows-x86_64.zip

  # ---------------------------------------------------------------------------
  # Windows ARM64 (cross-compiled on Ubuntu with llvm-mingw)
  # ---------------------------------------------------------------------------
  build-windows-arm64:
    name: Windows ARM64
    runs-on: ubuntu-24.04
    env:
      HOST: aarch64-w64-mingw32
      PREFIX: /usr/local/aarch64-w64-mingw32
      LLVM_MINGW_VER: "20250114"
      CC: aarch64-w64-mingw32-clang
      CXX: aarch64-w64-mingw32-clang++
      AR: aarch64-w64-mingw32-ar
      RANLIB: aarch64-w64-mingw32-ranlib
      STRIP: aarch64-w64-mingw32-strip
    steps:
      - uses: actions/checkout@v4

      - name: Install llvm-mingw toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils autoconf automake autotools-dev autopoint libtool \
            patch ca-certificates pkg-config curl dpkg-dev lzip gettext
          curl -L --retry 5 --connect-timeout 15 -O https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_VER/llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar xf llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64.tar.xz
          echo "$PWD/llvm-mingw-$LLVM_MINGW_VER-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH

      - name: Download dependencies
        run: |
          . packaging/dependencies.env
          curl -L --retry 5 --connect-timeout 15 -O "$GMP_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$EXPAT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$SQLITE_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$ZLIB_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$OPENSSL_URL"

      - name: Build gmp
        run: |
          source packaging/dependencies.env
          tar xf "$GMP_ARCHIVE" && cd "gmp-$GMP_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --disable-cxx --disable-assembly \
            CC="$CC" CFLAGS="-O2 -g0"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC" CXX="$CXX"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC=$CC AR=$AR LD=$HOST-ld \
          RANLIB=$RANLIB STRIP=$STRIP \
          ./configure \
            --prefix=$PREFIX \
            --libdir=$PREFIX/lib \
            --includedir=$PREFIX/include \
            --static
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure \
            --disable-shared --enable-static --without-random \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            CC="$CC" LIBS="-lws2_32" \
            ac_cv_func_if_indextoname=no
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure mingw64 no-shared no-module no-tests no-asm \
            --prefix=$PREFIX --libdir=lib \
            CC=$CC AR=$AR RANLIB=$RANLIB \
            -O2
          env "PATH=$PATH" make -j$(nproc) build_libs
          sudo env "PATH=$PATH" make install_dev

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure \
            --disable-shared --enable-static \
            --disable-examples-build \
            --prefix=$PREFIX --host=$HOST \
            --build=$(dpkg-architecture -qDEB_BUILD_GNU_TYPE) \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CC="$CC" \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lws2_32 -lcrypt32"
          sudo env "PATH=$PATH" make -j$(nproc) install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --host=$HOST --prefix=$PREFIX \
            --without-included-gettext --disable-nls \
            --with-libcares --without-gnutls --with-openssl --without-wintls \
            --with-sqlite3 --without-libxml2 --with-libexpat \
            --with-libz --with-libgmp --with-libssh2 \
            --without-libgcrypt --without-libnettle \
            ARIA2_STATIC=yes \
            CC="$CC" CXX="$CXX" \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG="/usr/bin/pkg-config" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
            LIBS="-lcrypt32"
          make -j$(nproc)
          $STRIP src/aria2c.exe

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-windows-arm64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c.exe "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: aria2-*-windows-arm64.zip

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-intel
      - build-windows-x64
      - build-windows-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aria2-* > ../checksums.sha256
          cd ..
          mv checksums.sha256 "artifacts/aria2-${GITHUB_REF_NAME#v}-checksums.sha256"

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
