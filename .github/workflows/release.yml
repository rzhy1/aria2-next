name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Release tag to build. Use latest to read CMakeLists.txt and resolve
          v<PROJECT_VERSION>. Example: v2.0.2
        required: true
        default: latest
        type: string

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate-release:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        id: resolve
        run: |
          VERSION=$(sed -n 's/^  VERSION \([0-9][0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "Unable to read project version from CMakeLists.txt" >&2
            exit 1
          fi

          if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" = "latest" ]; then
            RELEASE_TAG="v$VERSION"
          fi

          TAG_VERSION="${RELEASE_TAG#v}"

          if ! printf '%s\n' "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match CMake project version $VERSION" >&2
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux x86_64 (static)
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Linux x86_64
    needs: validate-release
    runs-on: ubuntu-22.04
    env:
      PREFIX: /usr/local
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config

      - name: Download dependency sources
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$EXPAT_URL" "$EXPAT_ARCHIVE" "$EXPAT_SHA256"
          curl_fetch "$SQLITE_URL" "$SQLITE_ARCHIVE" "$SQLITE_SHA256"
          curl_fetch "$CARES_URL" "$CARES_ARCHIVE" "$CARES_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          ./configure --prefix=$PREFIX --static
          make -j$(nproc)
          sudo make install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure linux-x86_64 no-shared no-module no-tests \
            --prefix=$PREFIX --libdir=lib \
            -O2
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          sudo make install

      - name: Build aria2
        run: |
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DARIA2_ENABLE_STATIC=ON \
            -DARIA2_WITH_GNUTLS=OFF \
            -DARIA2_WITH_OPENSSL=ON \
            -DARIA2_WITH_LIBXML2=OFF \
            -DARIA2_WITH_EXPAT=ON \
            -DARIA2_WITH_CARES=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_WITH_SQLITE3=ON \
            -DARIA2_WITH_LIBSSH2=ON \
            -DCMAKE_C_FLAGS="-O2" \
            -DCMAKE_CXX_FLAGS="-O2" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$PREFIX/lib -static-libgcc -static-libstdc++" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
          cmake --build build/release -j$(nproc)
          strip build/release/aria2c
          ctest --test-dir build/release --output-on-failure
          packaging/scripts/check-runtime-deps linux build/release/aria2c

      - name: Package
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIRNAME="aria2-${VERSION}-linux-x86_64"
          mkdir -p "${DIRNAME}"
          cp build/release/aria2c "${DIRNAME}/"
          cp COPYING README.md "${DIRNAME}/"
          cp docs/completion/aria2c "${DIRNAME}/aria2c.bash_completion" || true
          tar cJf "${DIRNAME}.tar.xz" "${DIRNAME}"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: aria2-*-linux-x86_64.tar.xz

