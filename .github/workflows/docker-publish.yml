name: Docker Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Latest Release Image
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve latest release
        id: release
        run: |
          tag=$(gh release view --json tagName --jq .tagName)
          version=${tag#v}
          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid latest release tag: $tag" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Download latest release Linux assets
        run: |
          version="${{ steps.release.outputs.version }}"
          mkdir -p release-assets
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern "aria2-next-${version}-linux-x86_64" \
            --pattern "aria2-next-${version}-linux-aarch64" \
            --dir release-assets
          test -f "release-assets/aria2-next-${version}-linux-x86_64"
          test -f "release-assets/aria2-next-${version}-linux-aarch64"

      - name: Prepare container context
        run: |
          version="${{ steps.release.outputs.version }}"
          mkdir -p docker-context/linux-amd64 docker-context/linux-arm64
          cp packaging/docker/Dockerfile docker-context/Dockerfile
          cp "release-assets/aria2-next-${version}-linux-x86_64" docker-context/linux-amd64/aria2-next
          cp "release-assets/aria2-next-${version}-linux-aarch64" docker-context/linux-arm64/aria2-next
          chmod 755 docker-context/linux-amd64/aria2-next docker-context/linux-arm64/aria2-next

      - name: Resolve container tags
        id: container
        run: |
          image="ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          {
            echo "image=$image"
            echo "tags<<EOF"
            echo "$image:${{ steps.release.outputs.tag }}"
            echo "$image:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.container.outputs.tags }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            REVISION=${{ github.sha }}
