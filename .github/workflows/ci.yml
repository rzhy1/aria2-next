name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-test:
    name: CMake Build and Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libcppunit-dev libssl-dev \
            libxml2-dev zlib1g-dev libssh2-1-dev

      - name: Build c-ares
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$CARES_URL" "$CARES_ARCHIVE" "$CARES_SHA256"
          tar xf "$CARES_ARCHIVE"
          cmake -S "c-ares-$CARES_VERSION" -B build/ci-cares -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCARES_STATIC=ON \
            -DCARES_SHARED=OFF \
            -DCARES_BUILD_TESTS=OFF \
            -DCARES_BUILD_TOOLS=OFF \
            -DCMAKE_INSTALL_PREFIX="$PWD/build/ci-deps"
          cmake --build build/ci-cares
          cmake --install build/ci-cares

      - name: Configure
        run: |
          PKG_CONFIG_PATH="$PWD/build/ci-deps/lib/pkgconfig" \
          cmake --preset default -DCMAKE_PREFIX_PATH="$PWD/build/ci-deps"

      - name: Build
        run: cmake --build --preset default

      - name: Test
        run: ctest --preset default

      - name: Verify binary version
        run: build/default/aria2-next --version

  script-syntax:
    name: Script Syntax
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Validate maintained shell scripts
        run: |
          bash -n tools/build_test.sh
          bash -n scripts/bump-version.sh
          bash -n scripts/release.sh
          bash -n packaging/scripts/common.sh
          bash -n packaging/scripts/check-runtime-deps
          bash -n packaging/scripts/mingw-release
          bash -n packaging/scripts/android-release
