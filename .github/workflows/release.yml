name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64 (static)
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    env:
      PREFIX: /usr/local
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autotools-dev autopoint libtool pkg-config \
            gettext

      - name: Download dependency sources
        run: |
          . packaging/dependencies.env
          curl -L --retry 5 --connect-timeout 15 -O "$ZLIB_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$EXPAT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$SQLITE_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$OPENSSL_URL"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          ./configure --prefix=$PREFIX --static
          make -j$(nproc)
          sudo make install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure linux-x86_64 no-shared no-module no-tests \
            --prefix=$PREFIX --libdir=lib \
            -O2
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          sudo make install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            ARIA2_STATIC=yes \
            CXXFLAGS="-O2" CFLAGS="-O2" \
            LDFLAGS="-L$PREFIX/lib -static-libgcc -static-libstdc++" \
            CPPFLAGS="-I$PREFIX/include" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          strip src/aria2c
          # Verify static linkage
          ldd src/aria2c || true

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-linux-x86_64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          cp doc/bash_completion/aria2c "${DIRNAME}/aria2c.bash_completion" || true
          tar cJf "${DIRNAME}.tar.xz" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: aria2-*-linux-x86_64.tar.xz

  # ---------------------------------------------------------------------------
  # Linux ARM64 (static)
  # ---------------------------------------------------------------------------
  build-linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-22.04-arm
    env:
      PREFIX: /usr/local
    steps:
