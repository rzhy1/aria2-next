name: Bug Report
description: Report a reproducible aria2-next engine bug
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report engine bugs here. Motrix Next UI, installer, updater, tray, history, notification, and desktop integration issues belong in Motrix Next.
        Do not post secrets, cookies, proxy credentials, private tracker data, signed URL tokens, or unredacted crash dumps.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what failed and what you expected.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Aria2 Next Version
      description: Paste the version from `aria2-next --version`.
      placeholder: "Aria2 Next version 2.2.7"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows x86_64
        - Windows ARM64
        - Linux x86_64
        - Linux ARM64
        - Android ARM64
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "Windows 11 24H2, Ubuntu 24.04 x86_64, macOS 15.5"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected Surface
      options:
        - HTTP or HTTPS
        - FTP or SFTP
        - BitTorrent or magnet
        - ED2K
        - JSON-RPC
        - Session or input file
        - Checksum or integrity
        - Proxy or certificate
        - Startup or packaging
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command, RPC Call, or Input File
      description: Paste the smallest reproducing command, JSON-RPC request, or input-file entry. Redact secrets.
      render: text
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Provide the shortest sequence that reproduces the bug.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach or paste debug logs from `--log-level=debug --console-log-level=debug --log=aria2-next.log` when possible.
      render: text
    validations:
      required: true

  - type: textarea
    id: comparison
    attributes:
      label: Regression or Comparison
      description: Mention another aria2-next version, upstream aria2, browser, curl, or Motrix Next result if it behaves differently.

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I searched existing issues.
          required: true
        - label: I redacted secrets and private tokens.
          required: true
        - label: This is a reproducible engine bug, not a general usage question.
          required: true
