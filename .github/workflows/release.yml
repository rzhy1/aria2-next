name: Build aria2-next Windows x64

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: ubuntu-26.04
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /opt/mingw64/$HOST
      CC: x86_64-w64-mingw32-gcc
      CXX: x86_64-w64-mingw32-g++
      CFLAGS: "-Os -pipe -ffunction-sections -fdata-sections -flto=auto -g0"
      CXXFLAGS: "$CFLAGS"
      LDFLAGS: "-static -static-libgcc -static-libstdc++ -Wl,--gc-sections -s -fuse-ld=lld"
    steps:
    - name: Checkout aria2-next
      uses: actions/checkout@v6
      with:
        repository: AnInsomniacy/aria2-next
        ref: main

    - name: Install tools and custom toolchain
      run: |
        sudo apt update
        sudo apt install -y lld make cmake ninja-build pkg-config binutils curl tar dpkg-dev
        curl -SLf -o /tmp/mingw.tar.xz "https://github.com/rzhy1/musl-cross/releases/download/mingw-w64/x86_64-w64-mingw32-1.tar.xz"
        sudo mkdir -p /opt/mingw64
        sudo tar -xf /tmp/mingw.tar.xz --strip-components=1 -C /opt/mingw64
        echo "/opt/mingw64/bin" >> $GITHUB_PATH
        sudo ln -sf /usr/bin/ld.lld /opt/mingw64/bin/x86_64-w64-mingw32-ld
    
    - name: Prepare prefix
      run: |
        sudo mkdir -p $PREFIX
        sudo chown $USER:$USER $PREFIX

    - name: Debug compiler
      run: |
        export PATH=/opt/mingw64/bin:$PATH
        which x86_64-w64-mingw32-gcc
        x86_64-w64-mingw32-gcc --version
        echo "Testing simple compile..."
        echo 'int main(){}' | x86_64-w64-mingw32-gcc -xc - -o /tmp/test.exe
        ls -l /tmp/test.exe || echo "Compilation failed"
    - name: Build expat
      run: |
        EXPAT_VERSION=2.8.2
        curl -LO https://github.com/libexpat/libexpat/releases/download/R_2_8_2/expat-${EXPAT_VERSION}.tar.gz
        tar xf expat-${EXPAT_VERSION}.tar.gz
        cd expat-${EXPAT_VERSION}
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          CC=$CC \
          CFLAGS="$CFLAGS"
        make -j$(nproc)
        make install

    - name: Build zlib
      run: |
        ZLIB_VERSION=1.3.2
        curl -fLLO  https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz
        tar xf zlib-${ZLIB_VERSION}.tar.gz
        cd zlib-${ZLIB_VERSION}
        CC=$CC CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS" ./configure --static --prefix=$PREFIX
        make -j$(nproc)
        make install

    - name: Build sqlite3
      run: |
        SQLITE_VERSION=3530300
        curl -LO https://www.sqlite.org/2026/sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        tar xf sqlite-autoconf-${SQLITE_VERSION}.tar.gz
        cd sqlite-autoconf-${SQLITE_VERSION}
        CC=$CC CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS" ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          --disable-load-extension
        make -j$(nproc)
        make install

    - name: Build c-ares
      run: |
        CARES_VERSION=1.34.8
        curl -LO https://github.com/c-ares/c-ares/releases/download/v${CARES_VERSION}/c-ares-${CARES_VERSION}.tar.gz
        tar xf c-ares-${CARES_VERSION}.tar.gz
        cd c-ares-${CARES_VERSION}
        CC=$CC CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS" ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --disable-shared \
          --enable-static \
          LIBS="-lws2_32"
        make -j$(nproc)
        make install

    - name: Build libssh2
      run: |
        LIBSSH2_VERSION=1.11.1
        curl -LO https://www.libssh2.org/download/libssh2-${LIBSSH2_VERSION}.tar.gz
        tar xf libssh2-${LIBSSH2_VERSION}.tar.gz
        cmake \
          -S libssh2-${LIBSSH2_VERSION} \
          -B libssh2-build \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Windows \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_INSTALL_PREFIX=$PREFIX \
          -DCMAKE_EXE_LINKER_FLAGS="$LDFLAGS" \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON \
          -DBUILD_TESTING=OFF \
          -DCRYPTO_BACKEND=WinCNG \
          -DCMAKE_LINKER=/usr/bin/ld.lld \
          -DCMAKE_C_FLAGS="$CFLAGS"
        cmake --build libssh2-build --target install -j$(nproc)


    - name: Configure aria2-next
      run: |
        cmake \
        -S . \
        -B build \
        -G Ninja \
        -DCMAKE_SYSTEM_NAME=Windows \
        -DCMAKE_C_COMPILER=$CC \
        -DCMAKE_CXX_COMPILER=$CXX \
        -DCMAKE_BUILD_TYPE=Release \
        -DARIA2_STATIC_DEPENDENCIES=ON \
        -DARIA2_WITH_WINTLS=ON \
        -DARIA2_WITH_OPENSSL=OFF \
        -DARIA2_WITH_GNUTLS=OFF \
        -DARIA2_WITH_CARES=ON \
        -DARIA2_WITH_SQLITE3=ON \
        -DARIA2_WITH_EXPAT=ON \
        -DARIA2_WITH_LIBSSH2=ON \
        -DARIA2_WITH_LIBXML2=OFF \
        -DARIA2_WITH_GMP=OFF \
        -DARIA2_WITH_LIBGCRYPT=OFF \
        -DARIA2_WITH_LIBNETTLE=OFF \
        -DCMAKE_PREFIX_PATH=$PREFIX \
        -DCMAKE_C_FLAGS="$CFLAGS" \
        -DCMAKE_LINKER=/usr/bin/ld.lld \
        -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
        -DCMAKE_EXE_LINKER_FLAGS="$LDFLAGS" \
        -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
        -DCMAKE_SYSROOT=$PREFIX \
        -DPKG_CONFIG_EXECUTABLE=""
    - name: Compile
      run:
        cmake --build build --parallel $(nproc)
    - name: Package
      run: |
        mkdir -p release
        x86_64-w64-mingw32-strip --strip-all --remove-section=.comment --remove-section=.note build/aria2-next.exe -o release/aria2-next-windows-x64.exe
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-next-windows-x64
        path: release/aria2-next-windows-x64.exe

    - name: Create Release
      if: success()
      uses: ncipollo/release-action@v1
      with:
        tag: aria2-next
        allowUpdates: true
        artifacts: release/aria2-next-windows-x64.exe
        token: ${{ secrets.GITHUB_TOKEN }}
