name: Build or Packaging Issue
description: Report local build, CI, release artifact, checksum, dependency, or packaging failures
title: "[build]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the build, workflow, artifact, dependency, or packaging failure.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Local CMake build
        - GitHub Actions CI
        - GitHub Actions release
        - Linux release artifact
        - macOS release artifact
        - Windows release artifact
        - Android release artifact
        - Checksum file
        - Runtime dependency closure
        - Dependency source download
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: "v2.2.7 or commit SHA"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command or Workflow Run
      description: Paste the local command or link to the failing workflow run and job.
      render: shell
    validations:
      required: true

  - type: textarea
    id: failure
    attributes:
      label: Failure Output
      description: Paste the smallest complete failing log section. For release artifacts, include checksum or dependency inspection output when relevant.
      render: text
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, compiler, CMake version, Ninja version, dependency source, and target architecture.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I checked `packaging/dependencies.env` for the maintained dependency baseline.
          required: true
        - label: I included the failing command or workflow run link.
          required: true
