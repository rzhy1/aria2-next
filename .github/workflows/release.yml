  build-macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel
    env:
      PREFIX: ${{ github.workspace }}/packaging/build-deps
      MACOSX_VERSION_MIN: "11.0"
    steps:
      - uses: actions/checkout@v4

