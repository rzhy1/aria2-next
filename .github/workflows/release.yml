  # ---------------------------------------------------------------------------
  # Android ARM64
  # ---------------------------------------------------------------------------
  build-android-arm64:
    name: Android ARM64
    needs: resolve-release
    runs-on: ubuntu-24.04
    env:
      ARIA2_BUILD_PROFILE: ${{ needs.resolve-release.outputs.build_profile }}
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      CMAKE_BUILD_TYPE: ${{ needs.resolve-release.outputs.cmake_build_type }}
      HOST: aarch64-linux-android
      API: "33"
      PREFIX: ${{ github.workspace }}/packaging/android-deps
      STRIP_BINARY: ${{ needs.resolve-release.outputs.strip_binary }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            make binutils cmake ninja-build pkg-config curl tar unzip ca-certificates \
            dpkg-dev perl

      - name: Verify runner tools
        run: packaging/scripts/verify-runner-tools android

      - name: Resolve Android NDK
        run: |
          . packaging/dependencies.env
          NDK_HOME="${ANDROID_NDK_LATEST_HOME:-}"
          if [ -z "$NDK_HOME" ] || [ ! -d "$NDK_HOME" ]; then
            echo "ANDROID_NDK_LATEST_HOME is not available on this runner" >&2
            exit 1
          fi
          version_major=$(awk -F'= *' '/^Pkg\.Revision/ { split($2, parts, "."); print parts[1]; exit }' "$NDK_HOME/source.properties")
          if [ "$version_major" != "$ANDROID_NDK_VERSION" ]; then
            echo "Unexpected Android NDK major version: $version_major, expected $ANDROID_NDK_VERSION" >&2
            exit 1
          fi
          toolchain="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          PATH="$toolchain/bin:$PATH"
          command -v "aarch64-linux-android${API}-clang"
          command -v "aarch64-linux-android${API}-clang++"
          command -v llvm-ar
          command -v llvm-ranlib
          command -v llvm-strip
          {
            echo "NDK=$NDK_HOME"
            echo "TOOLCHAIN=$toolchain"
            echo "AR=llvm-ar"
            echo "CC=${HOST}${API}-clang"
            echo "CXX=${HOST}${API}-clang++"
            echo "RANLIB=llvm-ranlib"
            echo "STRIP=llvm-strip"
          } >> "$GITHUB_ENV"
          echo "$toolchain/bin" >> "$GITHUB_PATH"

      - name: Download dependency sources
        run: |
          . packaging/dependencies.env
          . packaging/scripts/common.sh
          curl_fetch "$OPENSSL_URL" "$OPENSSL_ARCHIVE" "$OPENSSL_SHA256"
          curl_fetch "$EXPAT_URL" "$EXPAT_ARCHIVE" "$EXPAT_SHA256"
          curl_fetch "$ZLIB_URL" "$ZLIB_ARCHIVE" "$ZLIB_SHA256"
          curl_fetch "$CARES_URL" "$CARES_ARCHIVE" "$CARES_SHA256"
          curl_fetch "$LIBSSH2_URL" "$LIBSSH2_ARCHIVE" "$LIBSSH2_SHA256"

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile android
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ANDROID_NDK_HOME="$NDK" ANDROID_NDK_ROOT="$NDK" PATH="$TOOLCHAIN/bin:$PATH" \
          ./Configure no-shared no-module no-tests --prefix="$PREFIX" android-arm64 \
            -D__ANDROID_API__=$API $RELEASE_CFLAGS
          make -j$(nproc)
          make install_sw

      - name: Build expat
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile android
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          CPPFLAGS="$RELEASE_CPPFLAGS" CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --host="$HOST" \
            --build="$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)" \
            --prefix="$PREFIX" \
            --disable-shared
          make -j$(nproc) install

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile android
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CC="$CC" AR="$AR" RANLIB="$RANLIB" STRIP="$STRIP" \
          CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --prefix="$PREFIX" \
            --libdir="$PREFIX/lib" \
            --includedir="$PREFIX/include" \
            --static
          make -j$(nproc) install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile android
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          CPPFLAGS="$RELEASE_CPPFLAGS" CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --host="$HOST" \
            --build="$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)" \
            --prefix="$PREFIX" \
            --disable-shared
          make -j$(nproc) install

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          . packaging/scripts/release-size-profile android
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          CPPFLAGS="-I$PREFIX/include $RELEASE_CPPFLAGS" CFLAGS="$RELEASE_CFLAGS" LDFLAGS="$RELEASE_LDFLAGS" \
          ./configure \
            --host="$HOST" \
            --build="$(dpkg-architecture -qDEB_BUILD_GNU_TYPE)" \
            --prefix="$PREFIX" \
            --disable-shared \
            --with-crypto=openssl \
            --with-libssl-prefix="$PREFIX" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc) install

      - name: Build aria2
        run: |
          . packaging/scripts/release-size-profile android
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK="$NDK" \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_STL_TYPE=c++_static \
            -DCMAKE_SYSTEM_VERSION="$API" \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DARIA2_STATIC_DEPENDENCIES=ON \
            -DARIA2_WITH_WINTLS=OFF \
            -DARIA2_WITH_GNUTLS=OFF \
            -DARIA2_WITH_OPENSSL=ON \
            -DARIA2_WITH_LIBXML2=OFF \
            -DARIA2_WITH_EXPAT=ON \
            -DARIA2_WITH_CARES=ON \
            -DARIA2_WITH_ZLIB=ON \
            -DARIA2_WITH_SQLITE3=OFF \
            -DARIA2_WITH_LIBSSH2=ON \
            -DARIA2_RELEASE_SIZE_OPTIMIZED=ON \
            -DCMAKE_C_FLAGS="$RELEASE_CFLAGS" \
            -DCMAKE_CXX_FLAGS="$RELEASE_CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$PREFIX/lib $RELEASE_LDFLAGS" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_FIND_ROOT_PATH="$PREFIX;$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot" \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_LIBRARY_SUFFIXES=.a
          cmake --build build/release -j$(nproc)
          if [ "$STRIP_BINARY" = true ]; then
            "$STRIP" build/release/aria2-next
          fi
          READELF="$TOOLCHAIN/bin/llvm-readelf" packaging/scripts/check-runtime-deps android-arm64 build/release/aria2-next
          READELF="$TOOLCHAIN/bin/llvm-readelf" SIZE="$TOOLCHAIN/bin/llvm-size" packaging/scripts/size-audit android-arm64 build/release/aria2-next

      - name: Package
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          cp build/release/aria2-next "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-android-arm64"
          chmod 755 "aria2-next-${VERSION}${ARTIFACT_SUFFIX}-android-arm64"

      - uses: actions/upload-artifact@v7
        with:
          name: android-arm64${{ needs.resolve-release.outputs.artifact_suffix }}
          path: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-android-arm64
          archive: false

  # ---------------------------------------------------------------------------
  # Publish or archive release assets
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Publish or Archive Release Assets
    needs:
      - resolve-release
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-intel
      - build-windows-x64
      - build-windows-arm64
      - build-android-arm64
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_SUFFIX: ${{ needs.resolve-release.outputs.artifact_suffix }}
      VERSION: ${{ needs.resolve-release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Verify runner tools
        run: packaging/scripts/verify-runner-tools release-tools

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum aria2-next-* > ../checksums.sha256
          cd ..
          mv checksums.sha256 "artifacts/aria2-next-${VERSION}${ARTIFACT_SUFFIX}-checksums.sha256"

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" artifacts/* --clobber

      - name: Upload artifacts for manual validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: aria2-next-${{ needs.resolve-release.outputs.version }}${{ needs.resolve-release.outputs.artifact_suffix }}-release-assets
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
