          curl -L --retry 5 --connect-timeout 15 -O "$EXPAT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$SQLITE_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$OPENSSL_URL"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          ./configure --prefix=$PREFIX --static
          make -j$(nproc)
          sudo make install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX
          make -j$(nproc)
          sudo make install

      - name: Build OpenSSL
        run: |
          source packaging/dependencies.env
          tar xf "$OPENSSL_ARCHIVE" && cd "openssl-$OPENSSL_VERSION"
          ./Configure linux-aarch64 no-shared no-module no-tests \
            --prefix=$PREFIX --libdir=lib \
            -O2
          make -j$(nproc)
          sudo make install_sw

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-crypto=openssl --with-libssl-prefix=$PREFIX \
            CPPFLAGS="-I$PREFIX/include" LDFLAGS="-L$PREFIX/lib" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          sudo make install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --disable-nls \
            ARIA2_STATIC=yes \
            CXXFLAGS="-O2" CFLAGS="-O2" \
            LDFLAGS="-L$PREFIX/lib -static-libgcc -static-libstdc++" \
            CPPFLAGS="-I$PREFIX/include" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(nproc)
          strip src/aria2c
          # Verify static linkage
          ldd src/aria2c || true

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-linux-aarch64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          cp doc/bash_completion/aria2c "${DIRNAME}/aria2c.bash_completion" || true
          tar cJf "${DIRNAME}.tar.xz" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: aria2-*-linux-aarch64.tar.xz

  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon, static)
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-15
    env:
      PREFIX: ${{ github.workspace }}/packaging/build-deps
      MACOSX_VERSION_MIN: "11.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config gettext

      - name: Download dependency sources
        run: |
          . packaging/dependencies.env
          curl -L --retry 5 --connect-timeout 15 -O "$ZLIB_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$EXPAT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$SQLITE_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$CARES_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$GMP_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBGPG_ERROR_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBGCRYPT_URL"
          curl -L --retry 5 --connect-timeout 15 -O "$LIBSSH2_URL"

      - name: Build zlib
        run: |
          source packaging/dependencies.env
          tar xf "$ZLIB_ARCHIVE" && cd "zlib-$ZLIB_VERSION"
          CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2" \
          ./configure --prefix=$PREFIX --static
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build expat
        run: |
          source packaging/dependencies.env
          tar xf "$EXPAT_ARCHIVE" && cd "expat-$EXPAT_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build sqlite3
        run: |
          source packaging/dependencies.env
          tar xf "$SQLITE_ARCHIVE" && cd "sqlite-autoconf-$SQLITE_AUTOCONF_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build c-ares
        run: |
          source packaging/dependencies.env
          tar xf "$CARES_ARCHIVE" && cd "c-ares-$CARES_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build gmp
        run: |
          source packaging/dependencies.env
          tar xf "$GMP_ARCHIVE" && cd "gmp-$GMP_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --disable-cxx --with-pic \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build libgpg-error
        run: |
          source packaging/dependencies.env
          tar xf "$LIBGPG_ERROR_ARCHIVE" && cd "libgpg-error-$LIBGPG_ERROR_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-pic --disable-languages --disable-doc --disable-nls \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build libgcrypt
        run: |
          source packaging/dependencies.env
          tar xf "$LIBGCRYPT_ARCHIVE" && cd "libgcrypt-$LIBGCRYPT_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-gpg-error-prefix=$PREFIX --disable-asm \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build libssh2
        run: |
          source packaging/dependencies.env
          tar xf "$LIBSSH2_ARCHIVE" && cd "libssh2-$LIBSSH2_VERSION"
          ./configure --disable-shared --enable-static --prefix=$PREFIX \
            --with-crypto=libgcrypt --with-libgcrypt-prefix=$PREFIX \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build aria2
        run: |
          autoreconf -i
          ./configure \
            --without-openssl --without-gnutls --with-appletls \
            --without-libxml2 --with-libexpat \
            --with-libcares --with-libz --with-sqlite3 --with-libssh2 \
            --with-libgmp --with-libgcrypt \
            --without-libnettle \
            --disable-nls \
            ARIA2_STATIC=yes \
            CFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2" \
            CXXFLAGS="-mmacosx-version-min=$MACOSX_VERSION_MIN -O2" \
            LDFLAGS="-L$PREFIX/lib -Wl,-dead_strip" \
            CPPFLAGS="-I$PREFIX/include" \
            PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          make -j$(sysctl -n hw.ncpu)
          strip src/aria2c
          # Verify only system frameworks are linked
          otool -L src/aria2c

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="aria2-${VERSION}-macos-arm64"
          mkdir -p "${DIRNAME}"
          cp src/aria2c "${DIRNAME}/"
          cp COPYING README.rst "${DIRNAME}/"
          tar cjf "${DIRNAME}.tar.bz2" "${DIRNAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: aria2-*-macos-arm64.tar.bz2

  # ---------------------------------------------------------------------------
  # macOS Intel (x86_64, static)
